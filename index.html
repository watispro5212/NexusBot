<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Deep Space Protocol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="space-bg">
        <div class="stars"></div>
    </div>

    <nav>
        <div class="logo">NEXUS</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#stats">Telemetry</a>
            <a href="https://discord.com/api/oauth2/authorize?client_id=1480725340753101031&permissions=8&scope=bot%20applications.commands">Initialize</a>
        </div>
    </nav>

    <main>
        <section class="hero" id="home">
            <h1>The Singularity Core.</h1>
            <p>A high-performance neural framework for elite Discord communities. Secure. Scalable. Hand-crafted for total node dominion.</p>
            <div class="hero-actions">
                <a href="https://discord.com/api/oauth2/authorize?client_id=1480725340753101031&permissions=8&scope=bot%20applications.commands" class="btn btn-primary">Connect Node</a>
            </div>

            <div class="stats" id="stats">
                <div class="stat-item">
                    <span class="stat-value" id="guild-count">...</span>
                    <span class="stat-label">Active Sectors</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="user-count">...</span>
                    <span class="stat-label">Total Operatives</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('guild-count').textContent = data.guilds.toLocaleString();
                document.getElementById('user-count').textContent = data.users.toLocaleString();
            } catch (err) {
                console.error('Telemetry uplink failure:', err);
            }
        }
        fetchStats();
    </script>
</body>
</html>
